<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#FFFFFF" id="metaThemeColor" />
<script>
(function(){try{
  if(localStorage.getItem('itm-theme')==='dark'){document.documentElement.setAttribute('data-theme','dark');}
}catch(e){}})();
</script>
<title>Rental App — ITM Green Mobility</title>
<meta name="description" content="Rental App simulation — browse the fleet, book, unlock digitally and return with an inspection." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#FFFFFF;--ink-2:#F4F6F8;--ink-3:#FFFFFF;--hunter:#123D2A;
  --volt:#34D399;--volt-text:#047857;--emerald:#10B981;--amber:#B45309;--sky:#0284C7;
  --coral:#FF7A59;--violet:#7C6CF0;--text:#111417;--muted:#4B5563;--faint:#6B7280;
  --line:rgba(15,23,31,.10);--glass:rgba(255,255,255,.78);
  --tint-02:rgba(15,23,31,.035);--tint-03:rgba(15,23,31,.05);--tint-04:rgba(15,23,31,.065);
  --radius:22px;--shadow:0 24px 50px -20px rgba(15,23,31,.14);--maxw:1220px;
}
html[data-theme="dark"]{
  --ink:#071A12;--ink-2:#0A2418;--ink-3:#0E2E20;--hunter:#123D2A;
  --volt:#B7F24C;--volt-text:#B7F24C;--emerald:#2FB170;--amber:#FFB020;--sky:#58C7F2;
  --coral:#FF7A59;--violet:#7C6CF0;--text:#EAF3EC;--muted:#9DB5A6;--faint:#5F7A6B;
  --line:rgba(183,242,76,.14);--glass:rgba(9,28,19,.55);
  --tint-02:rgba(255,255,255,.02);--tint-03:rgba(255,255,255,.03);--tint-04:rgba(255,255,255,.04);
  --shadow:0 30px 60px -20px rgba(0,0,0,.65);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--ink);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased;transition:background-color .35s ease,color .35s ease}
h1,h2,h3,h4{font-family:'Sora',sans-serif;letter-spacing:-.02em;line-height:1.1}
a{color:inherit;text-decoration:none}
.mono{font-family:'JetBrains Mono',monospace}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}
.nav{position:sticky;top:0;z-index:50;background:var(--glass);backdrop-filter:blur(18px);border-bottom:1px solid var(--line);padding:16px 0}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:12px}
.brand .mark{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(140deg,var(--hunter),#061c12);border:1px solid var(--line)}
.brand .mark svg{width:20px;height:20px}
.brand .name{font-family:'Sora';font-weight:700;font-size:16px}
.brand .name span{color:var(--volt-text)}
.back-link{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:14px;font-weight:500;padding:9px 14px;border-radius:999px;border:1px solid var(--line);transition:.2s}
.back-link:hover{border-color:var(--volt-text);color:var(--text)}
.back-link svg{width:15px;height:15px}
.theme-toggle{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;flex:0 0 auto;border-radius:11px;border:1px solid var(--line);background:var(--tint-04);color:var(--text);cursor:pointer}
.theme-toggle svg{width:18px;height:18px}
.theme-toggle .i-sun{display:none}.theme-toggle .i-moon{display:block}
html[data-theme="dark"] .theme-toggle .i-sun{display:block}
html[data-theme="dark"] .theme-toggle .i-moon{display:none}
.nav-actions{display:flex;align-items:center;gap:10px}
.page-head{padding:44px 0 8px}
.eyebrow{font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--volt-text);display:inline-flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:24px;height:1px;background:var(--volt-text);opacity:.7}
.page-head h1{font-size:clamp(28px,4vw,42px);font-weight:800;margin:14px 0 10px}
.page-head p{color:var(--muted);max-width:600px;font-size:16px}
.stage{padding:36px 0 90px}
.stage-grid{display:grid;grid-template-columns:340px 230px 1fr;gap:26px;align-items:start}
.rail{display:flex;flex-direction:column;gap:2px;position:sticky;top:90px}
.rail-item{display:flex;align-items:flex-start;gap:12px;padding:11px 6px;border-radius:12px;transition:.25s}
.rail-item .dot{flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--faint);background:var(--ink-3);transition:.25s}
.rail-item .label{font-size:13.5px;color:var(--faint);font-weight:500;padding-top:3px;transition:.25s}
.rail-item.active .dot{border-color:var(--volt-text);color:var(--volt-text);background:var(--tint-04);box-shadow:0 0 0 4px var(--tint-04)}
.rail-item.active .label{color:var(--text);font-weight:700}
.rail-item.done .dot{background:var(--volt-text);border-color:var(--volt-text);color:#052012}
.rail-item.done .label{color:var(--muted)}
.rail-item.done .dot svg{width:13px;height:13px}
.value-card{background:var(--ink-3);border:1px solid var(--line);border-radius:var(--radius);padding:32px;min-height:420px;display:flex;flex-direction:column}
.value-tag{display:inline-flex;align-self:flex-start;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#052012;background:var(--volt);padding:6px 12px;border-radius:999px;margin-bottom:18px}
.value-card h2{font-size:24px;font-weight:700;margin-bottom:12px}
.value-card p{color:var(--muted);font-size:15.5px;max-width:440px}
.value-checks{margin-top:24px;display:flex;flex-direction:column;gap:11px}
.value-checks .vc{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text);opacity:0;transform:translateY(6px);transition:opacity .5s,transform .5s}
.value-checks .vc.show{opacity:1;transform:none}
.value-checks .vc .tick{width:20px;height:20px;border-radius:50%;background:var(--volt-text);color:#052012;display:grid;place-items:center;flex:0 0 auto}
.value-checks .vc .tick svg{width:12px;height:12px}
.stage-actions{margin-top:auto;padding-top:26px;display:flex;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:9px;justify-content:center;font-weight:600;font-size:15px;padding:13px 24px;border-radius:999px;cursor:pointer;border:1px solid transparent;transition:.25s;white-space:nowrap}
.btn-primary{background:linear-gradient(120deg,var(--volt),var(--emerald));color:#052012;box-shadow:0 12px 26px -8px rgba(183,242,76,.45)}
.btn-primary:hover{transform:translateY(-2px)}
.btn-ghost{background:var(--tint-04);border-color:var(--line);color:var(--text)}
.btn-ghost:hover{border-color:var(--volt-text);transform:translateY(-2px)}
.btn[disabled]{opacity:.5;pointer-events:none}
.phone-col{position:sticky;top:90px;display:flex;justify-content:center}
.rail-col{position:sticky;top:90px}
.phone{width:300px;height:620px;border-radius:52px;background:linear-gradient(160deg,#3a3a3c,#1c1c1e);border:6px solid #0a0a0b;box-shadow:var(--shadow),inset 0 0 0 2px rgba(255,255,255,.07);position:relative;overflow:hidden;flex:0 0 auto}
.phone::before{content:"";position:absolute;top:18px;left:50%;transform:translateX(-50%);width:100px;height:30px;background:#000;border-radius:18px;z-index:6}
.phone-frame{position:relative;display:inline-block}
.phone-btn{position:absolute;background:#0a0a0b;z-index:1}
.btn-mute{left:-3px;top:108px;width:3px;height:22px;border-radius:2px 0 0 2px}
.btn-vol-up{left:-3px;top:146px;width:3px;height:44px;border-radius:2px 0 0 2px}
.btn-vol-down{left:-3px;top:200px;width:3px;height:44px;border-radius:2px 0 0 2px}
.btn-power{right:-3px;top:170px;width:3px;height:70px;border-radius:0 2px 2px 0}
.phone-screen{position:absolute;inset:0;background:linear-gradient(180deg,#fbfdf9,#eef4e8);display:flex;flex-direction:column}
.p-status{display:flex;justify-content:space-between;align-items:center;padding:20px 22px 6px;font-size:12px;font-weight:600;color:#123D2A;font-family:'JetBrains Mono',monospace}
.p-body{flex:1;padding:20px 20px 26px;display:flex;flex-direction:column;overflow:hidden auto}
.p-fade{animation:pfade .45s ease}
@keyframes pfade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.p-h{font-family:'Sora';font-weight:700;font-size:19px;color:#111417;margin-bottom:6px}
.p-sub{font-size:12.5px;color:#4B5563;margin-bottom:18px}
.p-field{background:#fff;border:1px solid rgba(15,23,31,.10);border-radius:13px;padding:12px 14px;margin-bottom:10px}
.p-field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:#6B7280;margin-bottom:4px}
.p-field .val{font-size:14.5px;font-weight:600;color:#111417}
.p-chip-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.p-chip{font-size:12px;font-weight:600;padding:8px 12px;border-radius:999px;background:#fff;border:1px solid rgba(15,23,31,.10);color:#111417;display:inline-flex;align-items:center;gap:6px}
.p-chip.on{background:var(--volt);border-color:var(--volt);color:#052012}
.p-chip.ok{background:#e6f6ea;border-color:#bfe6c9;color:#1a7a3b}
.p-card{background:#fff;border:1px solid rgba(15,23,31,.08);border-radius:14px;padding:14px;margin-bottom:10px}
.p-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(15,23,31,.07);font-size:13px}
.p-row:last-child{border-bottom:none}
.p-row .nm{font-weight:600;color:#111417}
.p-row .meta{color:#6B7280;font-size:11.5px}
.p-stat-row{display:flex;gap:8px;margin-bottom:10px}
.p-stat{flex:1;background:#fff;border:1px solid rgba(15,23,31,.08);border-radius:12px;padding:10px 12px;text-align:center}
.p-stat b{display:block;font-family:'Sora';font-size:16px;color:#111417}
.p-stat small{font-size:10px;color:#6B7280}
.p-vcard{display:flex;gap:10px;align-items:center}
.p-vcard .th{width:52px;height:40px;border-radius:9px;background:linear-gradient(140deg,#123D2A,#0a2116);display:grid;place-items:center;color:#B7F24C;flex:0 0 auto}
.p-spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(15,23,31,.12);border-top-color:#2FB170;animation:spin .8s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.p-center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;flex:1}
.p-badge-ok{width:64px;height:64px;border-radius:50%;background:var(--volt);color:#052012;display:grid;place-items:center;margin-bottom:16px}
.p-badge-ok svg{width:30px;height:30px}
.p-searching{font-size:13px;color:#4B5563;text-align:center;margin-top:10px}
.p-leaf{position:absolute;bottom:16px;left:0;right:0;text-align:center;font-size:10.5px;color:#6B7280;letter-spacing:.05em}
.p-btn{margin-top:auto;background:linear-gradient(120deg,var(--volt),var(--emerald));color:#052012;font-weight:700;font-size:14.5px;padding:14px;border-radius:14px;text-align:center;border:none;cursor:pointer;font-family:inherit}
.p-btn:active{transform:scale(.98)}
@media(max-width:1000px){
  .stage-grid{grid-template-columns:1fr;gap:24px}
  .rail{position:static;flex-direction:row;flex-wrap:wrap;gap:8px}
  .rail-item{padding:8px 10px;background:var(--ink-3);border:1px solid var(--line);border-radius:999px}
  .rail-item .label{display:none}
  .phone-col{position:static;order:-1}
}
@media(max-width:480px){ .phone{width:260px;height:540px} }
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <div class="brand">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" fill="#B7F24C"/></svg></div>
      <div class="name">ITM <span>Green</span> Mobility</div>
    </div>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light and dark mode">
        <svg class="i-sun" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.8"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <svg class="i-moon" viewBox="0 0 24 24" fill="none"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </button>
      <a class="back-link" href="../../index.html#platforms">
        <svg viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back to mobile apps
      </a>
    </div>
  </div>
</nav>

<header class="page-head">
  <div class="wrap">
    <span class="eyebrow">Mobile app · Rental</span>
    <h1>Rental App — live simulation</h1>
    <p>Walk through the rental experience: verify ID, secure a deposit, then browse the fleet, book, unlock digitally and return with a guided inspection.</p>
  </div>
</header>

<section class="stage">
  <div class="wrap stage-grid">
    <div class="phone-col">
      <div class="phone-frame">
        <div class="phone-btn btn-mute"></div>
        <div class="phone-btn btn-vol-up"></div>
        <div class="phone-btn btn-vol-down"></div>
        <div class="phone-btn btn-power"></div>
        <div class="phone">
        <div class="phone-screen">
          <div class="p-status"><span>9:41</span><span>●●● Green Rental</span><span>100%</span></div>
          <div class="p-body" id="phoneBody"></div>
        </div>
      </div>
      </div>
    </div>
    <nav class="rail" id="rail"></nav>
    <div class="value-card">
      <span class="value-tag" id="valueTag">Onboarding</span>
      <h2 id="valueTitle"></h2>
      <p id="valueText"></p>
      <div class="value-checks" id="valueChecks"></div>
      <div class="stage-actions">
        <button class="btn btn-primary" id="ctaBtn">Continue</button>
        <button class="btn btn-ghost" id="restartBtn" style="display:none">Restart demo</button>
        <a class="btn btn-ghost" id="backAppsBtn" href="../../index.html#platforms" style="display:none">Back to mobile apps</a>
      </div>
    </div>
  </div>
</section>

<script>
var STEPS = [
  {
    rail:'Verify ID & license', tag:'Onboarding', title:'Verify your identity',
    text:'A quick ID and license check keeps every rental vehicle protected.',
    cta:'Verify',
    phone:function(){ return '\
      <div class="p-fade">\
        <div class="p-h">Verify to rent</div>\
        <div class="p-sub">Required once, valid for every future rental</div>\
        <div class="p-chip-row">\
          <span class="p-chip ok">✓ National ID</span>\
          <span class="p-chip ok">✓ Driver license</span>\
        </div>\
        <button class="p-btn" id="pAction">Verify</button>\
      </div>'; }
  },
  {
    rail:'Secure deposit', tag:'Onboarding', title:'A fully refundable deposit',
    text:'Held securely and released automatically at return — no cash handling.',
    cta:'Hold deposit',
    checks:['Identity & license verified'],
    phone:function(){ return '\
      <div class="p-fade">\
        <div class="p-h">Security deposit</div>\
        <div class="p-field"><label>Amount held</label><div class="val">50 000f</div></div>\
        <div class="p-chip-row"><span class="p-chip on">Mobile money</span><span class="p-chip">Card</span></div>\
        <button class="p-btn" id="pAction">Hold deposit</button>\
      </div>'; }
  },
  {
    rail:'Ready to rent', tag:'Onboarding', title:"You're ready to rent",
    text:'Verification complete — browse the fleet and book whenever you need a vehicle.',
    cta:'Browse the fleet',
    checks:['Identity & license verified','50 000f deposit held'],
    phone:function(){ return '\
      <div class="p-fade p-center">\
        <div class="p-badge-ok"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>\
        <div class="p-h">You&#39;re ready</div>\
        <div class="p-sub">Browse and book any time</div>\
        <button class="p-btn" id="pAction" style="margin-top:18px">Browse the fleet</button>\
      </div>'; }
  },
  {
    rail:'Browse the fleet', tag:'Rental loop', title:'See what’s available, live',
    text:'Real-time availability across the fleet — hourly, daily or weekly.',
    cta:'Select vehicle',
    phone:function(){ return '\
      <div class="p-fade">\
        <div class="p-h">Available near you</div>\
        <div class="p-card p-vcard"><div class="th">🚗</div><div><div class="nm" style="font-weight:700">Green EV · Hatchback</div><div class="p-row" style="border:none;padding:2px 0"><span class="meta">98% battery · 4 800f/day</span></div></div></div>\
        <div class="p-card p-vcard"><div class="th">🚙</div><div><div class="nm" style="font-weight:700">Green EV · SUV</div><div class="p-row" style="border:none;padding:2px 0"><span class="meta">76% battery · 7 200f/day</span></div></div></div>\
        <button class="p-btn" id="pAction">Select vehicle</button>\
      </div>'; }
  },
  {
    rail:'Book your vehicle', tag:'Rental loop', title:'Book by the hour, day or week',
    text:'Choose your rental window and see the total cost upfront.',
    cta:'Confirm booking',
    checks:['Selected Green EV · Hatchback'],
    phone:function(){ return '\
      <div class="p-fade">\
        <div class="p-h">Choose your rental period</div>\
        <div class="p-chip-row"><span class="p-chip">Hourly</span><span class="p-chip on">Daily</span><span class="p-chip">Weekly</span></div>\
        <div class="p-stat-row">\
          <div class="p-stat"><b>3 days</b><small>Duration</small></div>\
          <div class="p-stat"><b>14 400f</b><small>Total</small></div>\
        </div>\
        <button class="p-btn" id="pAction">Confirm booking</button>\
      </div>'; }
  },
  {
    rail:'Digital unlock', tag:'Rental loop', title:'Unlock with your phone',
    text:'No key handover — unlock and start the vehicle straight from the app.',
    cta:'Start rental',
    checks:['Booking confirmed — 3 days, 14 400f'],
    searching:true,
    phone:function(){ return '\
      <div class="p-fade">\
        <div class="p-spin"></div>\
        <div class="p-searching">Connecting to vehicle…</div>\
      </div>'; },
    phoneAfter:function(){ return '\
      <div class="p-fade p-center">\
        <div class="p-badge-ok"><svg viewBox="0 0 24 24" fill="none"><path d="M17 10V7a5 5 0 0 0-10 0v3M5 10h14v10H5z" stroke="currentColor" stroke-width="2" fill="none"/></svg></div>\
        <div class="p-h">Unlocked</div>\
        <div class="p-sub">Bay 12 · Green EV Hatchback</div>\
        <button class="p-btn" id="pAction" style="margin-top:18px">Start rental</button>\
      </div>'; }
  },
  {
    rail:'Return & inspect', tag:'Rental loop', title:'Digital return inspection',
    text:'A guided photo walkaround protects both you and the fleet.',
    cta:'Submit inspection',
    checks:['Vehicle unlocked — Bay 12'],
    phone:function(){ return '\
      <div class="p-fade">\
        <div class="p-h">Return inspection</div>\
        <div class="p-chip-row">\
          <span class="p-chip ok">✓ Exterior photos</span>\
          <span class="p-chip ok">✓ Interior check</span>\
          <span class="p-chip ok">✓ Charge level</span>\
        </div>\
        <button class="p-btn" id="pAction">Submit inspection</button>\
      </div>'; }
  },
  {
    rail:'Rental complete', tag:'Complete', title:'Deposit released, rental complete',
    text:'Your deposit is released automatically once the inspection clears — no disputes.',
    cta:null,
    checks:['Inspection passed — no damage found'],
    phone:function(){ return '\
      <div class="p-fade p-center">\
        <div class="p-badge-ok"><svg viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" fill="#052012"/></svg></div>\
        <div class="p-h">Rental complete</div>\
        <div class="p-sub">Deposit released to your wallet</div>\
        <div class="p-stat-row" style="margin-top:8px">\
          <div class="p-stat"><b>3 days</b><small>Rented</small></div>\
          <div class="p-stat"><b>14 400f</b><small>Total paid</small></div>\
        </div>\
        <div class="p-leaf">🌿 100% electric fleet</div>\
      </div>'; }
  }
];

var idx = 0, rail = document.getElementById('rail'), phoneBody = document.getElementById('phoneBody');
var valueTag=document.getElementById('valueTag'), valueTitle=document.getElementById('valueTitle'),
    valueText=document.getElementById('valueText'), valueChecks=document.getElementById('valueChecks'),
    ctaBtn=document.getElementById('ctaBtn'), restartBtn=document.getElementById('restartBtn'),
    backAppsBtn=document.getElementById('backAppsBtn');

function buildRail(){
  rail.innerHTML = STEPS.map(function(s,i){
    return '<div class="rail-item" data-i="'+i+'"><div class="dot">'+(i+1)+'</div><div class="label">'+s.rail+'</div></div>';
  }).join('');
}
function renderChecks(list){
  valueChecks.innerHTML = (list||[]).map(function(t){
    return '<div class="vc"><span class="tick"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span>'+t+'</span></div>';
  }).join('');
  requestAnimationFrame(function(){
    valueChecks.querySelectorAll('.vc').forEach(function(el,i){ setTimeout(function(){el.classList.add('show');}, i*120); });
  });
}
function updateRailStates(){
  rail.querySelectorAll('.rail-item').forEach(function(el){
    var i = +el.dataset.i;
    el.classList.remove('active','done');
    if(i < idx) el.classList.add('done');
    else if(i === idx) el.classList.add('active');
  });
  rail.querySelectorAll('.rail-item.done .dot').forEach(function(d){
    d.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  });
}
function render(){
  var step = STEPS[idx];
  updateRailStates();
  valueTag.textContent = step.tag;
  valueTitle.textContent = step.title;
  valueText.textContent = step.text;
  renderChecks(typeof step.checks === "function" ? step.checks() : step.checks);
  phoneBody.innerHTML = step.phone();
  wirePhoneAction(step);
  if(step.cta){
    ctaBtn.style.display="inline-flex"; ctaBtn.textContent = step.cta;
    ctaBtn.disabled = !!(step.searching || step.processing);
    restartBtn.style.display="none"; backAppsBtn.style.display="none";
  } else {
    ctaBtn.style.display="none";
    restartBtn.style.display="inline-flex"; backAppsBtn.style.display="inline-flex";
  }
  if(step.searching || step.processing){
    var stepAtStart = idx;
    setTimeout(function(){
      if(idx !== stepAtStart) return;
      phoneBody.innerHTML = step.phoneAfter();
      wirePhoneAction(step);
      ctaBtn.disabled = false;
    }, 1400);
  }
}
function wirePhoneAction(step){
  var pAction = document.getElementById("pAction");
  if(pAction){
    pAction.addEventListener("click", advance);
  }
}
function advance(){ if(idx < STEPS.length - 1){ idx++; render(); window.scrollTo({top:0,behavior:"smooth"}); } }
ctaBtn.addEventListener("click", advance);
restartBtn.addEventListener('click', function(){ idx = 0; render(); });
buildRail(); render();

(function(){
  var html=document.documentElement, metaColor=document.getElementById('metaThemeColor');
  var LIGHT_COLOR='#FFFFFF', DARK_COLOR='#071A12';
  function isDark(){return html.getAttribute('data-theme')==='dark';}
  function syncMeta(){if(metaColor)metaColor.setAttribute('content',isDark()?DARK_COLOR:LIGHT_COLOR);}
  function setTheme(dark){
    if(dark){html.setAttribute('data-theme','dark');}else{html.removeAttribute('data-theme');}
    try{localStorage.setItem('itm-theme',dark?'dark':'light');}catch(e){}
    syncMeta();
  }
  syncMeta();
  document.getElementById('themeToggle').addEventListener('click', function(){ setTheme(!isDark()); });
})();
</script>
</body>
</html>
